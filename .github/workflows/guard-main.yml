name: Guard main history
on:
  push:
    branches: [main]
jobs:
  no-squash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Require a merge commit on main
        run: |
          parents=$(git rev-list --parents -n 1 HEAD | wc -w)
          if [ "$parents" -lt 3 ]; then
            echo "::error::main got a non-merge commit (likely a squash). Use 'Create a merge commit' for releases."
            exit 1
          fi
